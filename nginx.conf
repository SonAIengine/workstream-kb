server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for Docsify
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # No cache for dynamic data
    location = /index.json {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Binary file downloads
    location ~* \.(docx|xlsx|pptx|pdf|zip|hwp|jmx|doc|xls|ppt)$ {
        add_header Content-Disposition "attachment";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/markdown;
}
